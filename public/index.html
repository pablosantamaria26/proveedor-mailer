<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Mailer · Mercado Limpio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --primary: #0f172a;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --muted: #64748b;
      --success: #16a34a;
      --error: #dc2626;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    header {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding: 0 4px;
    }

    .logo {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { color: white; }
    header h1 { font-size: 18px; font-weight: 700; color: var(--primary); line-height: 1.2; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .field {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      position: relative;
    }

    .field label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      padding-top: 10px;
      width: 62px;
      flex-shrink: 0;
    }

    .field input,
    .field textarea {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--primary);
      background: transparent;
      font-family: inherit;
      padding: 8px 0;
      line-height: 1.5;
    }

    .field textarea { resize: none; min-height: 180px; }

    /* Autocomplete */
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
      display: none;
    }

    .autocomplete-list.open { display: block; }

    .autocomplete-item {
      padding: 11px 18px;
      font-size: 14px;
      color: var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .autocomplete-item:hover,
    .autocomplete-item.active { background: #f8fafc; }
    .autocomplete-item svg { color: var(--muted); flex-shrink: 0; }

    /* Adjuntos */
    .attach-zone {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
    }

    .attach-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }

    .attach-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
    #fileInput { display: none; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px 5px 8px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--primary);
      max-width: 220px;
    }

    .chip svg { color: var(--muted); flex-shrink: 0; }
    .chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip-size { color: var(--muted); flex-shrink: 0; }
    .chip-remove { cursor: pointer; color: var(--muted); flex-shrink: 0; padding: 2px; border-radius: 4px; }
    .chip-remove:hover { color: var(--error); background: #fee2e2; }

    /* Footer */
    .card-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .from-info {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .from-info span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .btn-send {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }

    .btn-send:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-send:active:not(:disabled) { transform: scale(.97); }
    .btn-send:disabled { opacity: .6; cursor: not-allowed; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--primary);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      opacity: 0;
      transition: opacity .25s, transform .25s;
      z-index: 999;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    #toast.show   { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--error); }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      body { padding: 10px; }
      .field { padding: 11px 14px; }
      .field label { width: 54px; font-size: 12px; }
      .field input, .field textarea { font-size: 14px; }
      .attach-zone, .card-footer { padding: 11px 14px; }
      .btn-send { padding: 10px 18px; font-size: 14px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <div>
      <h1>Mailer Proveedores</h1>
      <p>Mercado Limpio</p>
    </div>
  </header>

  <div class="card">

    <div class="field" id="toField">
      <label for="toInput">Para</label>
      <input id="toInput" type="email" inputmode="email"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        placeholder="proveedor@empresa.com">
      <div class="autocomplete-list" id="acList"></div>
    </div>

    <div class="field">
      <label for="subjectInput">Asunto</label>
      <input id="subjectInput" type="text" autocomplete="off"
        placeholder="Ej: Lista de precios Abril 2026">
    </div>

    <div class="field" style="border-bottom: none;">
      <label for="msgInput" style="padding-top: 10px;">Mensaje</label>
      <textarea id="msgInput" placeholder="Escribí tu mensaje acá..."
        autocorrect="on" spellcheck="true"></textarea>
    </div>

    <div class="attach-zone">
      <label class="attach-btn" for="fileInput">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
        </svg>
        Adjuntar archivos
      </label>
      <input type="file" id="fileInput" multiple
        accept=".pdf,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.webp,.csv,.txt,.zip,.doc,.docx">
      <div class="chips" id="chipsContainer"></div>
    </div>

    <div class="card-footer">
      <div class="from-info">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
        <span>ventas@mercadolimpio.ar</span>
      </div>
      <button class="btn-send" id="sendBtn" onclick="sendEmail()">
        <span id="btnText">Enviar</span>
        <div class="spinner" id="spinner"></div>
        <svg id="sendIcon" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ── Configuración ─────────────────────────────────────────────────────────
    // Reemplazá con la URL real de tu worker (Render/Railway)
    // y con el mismo valor de MAILER_SECRET que pusiste en las variables del worker
    const WORKER_URL    = "https://TU-WORKER.onrender.com";
    const MAILER_SECRET = "TU_MAILER_SECRET";

    const HEADERS = MAILER_SECRET ? { "X-Mailer-Secret": MAILER_SECRET } : {};

    // ── Archivos ──────────────────────────────────────────────────────────────
    let selectedFiles = [];

    document.getElementById("fileInput").addEventListener("change", function () {
      Array.from(this.files).forEach(f => {
        if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) {
          selectedFiles.push(f);
        }
      });
      this.value = "";
      renderChips();
    });

    function renderChips() {
      const c = document.getElementById("chipsContainer");
      c.innerHTML = "";
      selectedFiles.forEach((f, i) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.innerHTML = `
          ${fileIcon(f.name)}
          <span class="chip-name" title="${esc(f.name)}">${esc(f.name)}</span>
          <span class="chip-size">${fmtSize(f.size)}</span>
          <span class="chip-remove" onclick="removeFile(${i})">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </span>`;
        c.appendChild(chip);
      });
    }

    function removeFile(i) { selectedFiles.splice(i, 1); renderChips(); }

    function fileIcon(name) {
      const ext = name.split(".").pop().toLowerCase();
      if (["jpg","jpeg","png","gif","webp"].includes(ext))
        return `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 15l-5-5L5 21"/></svg>`;
      if (["xls","xlsx","csv"].includes(ext))
        return `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>`;
      return `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>`;
    }

    function fmtSize(b) {
      if (b < 1024) return b + " B";
      if (b < 1048576) return (b / 1024).toFixed(0) + " KB";
      return (b / 1048576).toFixed(1) + " MB";
    }

    function esc(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── Autocomplete ──────────────────────────────────────────────────────────
    let allContacts = [];
    let acActive    = -1;

    fetch(`${WORKER_URL}/mailer/contacts`, { headers: HEADERS })
      .then(r => r.json())
      .then(d => { allContacts = Array.isArray(d) ? d : []; })
      .catch(() => {});

    const toInput = document.getElementById("toInput");
    const acList  = document.getElementById("acList");

    toInput.addEventListener("input", showAc);
    toInput.addEventListener("focus", showAc);
    toInput.addEventListener("keydown", navigateAc);
    document.addEventListener("click", e => { if (!e.target.closest("#toField")) closeAc(); });

    function showAc() {
      const q = toInput.value.trim().toLowerCase();
      const matches = q.length === 0
        ? allContacts.slice(0, 8)
        : allContacts.filter(c => c.includes(q)).slice(0, 8);
      if (!matches.length) { closeAc(); return; }
      acList.innerHTML = matches.map((c, i) => `
        <div class="autocomplete-item" data-email="${esc(c)}" data-idx="${i}" onclick="selectAc('${esc(c)}')">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          ${esc(c)}
        </div>`).join("");
      acActive = -1;
      acList.classList.add("open");
    }

    function navigateAc(e) {
      const items = acList.querySelectorAll(".autocomplete-item");
      if (!items.length) return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        acActive = Math.min(acActive + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle("active", i === acActive));
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        acActive = Math.max(acActive - 1, -1);
        items.forEach((el, i) => el.classList.toggle("active", i === acActive));
      } else if (e.key === "Enter" && acActive >= 0) {
        e.preventDefault();
        selectAc(items[acActive].dataset.email);
      } else if (e.key === "Escape") {
        closeAc();
      }
    }

    function selectAc(email) {
      toInput.value = email;
      closeAc();
      document.getElementById("subjectInput").focus();
    }

    function closeAc() { acList.classList.remove("open"); acActive = -1; }

    // ── Envío ─────────────────────────────────────────────────────────────────
    async function sendEmail() {
      const to      = toInput.value.trim();
      const subject = document.getElementById("subjectInput").value.trim();
      const message = document.getElementById("msgInput").value.trim();

      if (!to)      { showToast("Ingresá el email del proveedor", "error"); toInput.focus(); return; }
      if (!subject) { showToast("Escribí el asunto", "error"); document.getElementById("subjectInput").focus(); return; }
      if (!message) { showToast("El mensaje no puede estar vacío", "error"); document.getElementById("msgInput").focus(); return; }

      const btn = document.getElementById("sendBtn");
      btn.disabled = true;
      document.getElementById("btnText").textContent = "Enviando";
      document.getElementById("spinner").style.display = "block";
      document.getElementById("sendIcon").style.display = "none";

      try {
        const form = new FormData();
        form.append("to", to);
        form.append("subject", subject);
        form.append("message", message);
        selectedFiles.forEach(f => form.append("archivos", f));

        const res  = await fetch(`${WORKER_URL}/mailer/send`, { method: "POST", headers: HEADERS, body: form });
        const json = await res.json();

        if (!json.ok) throw new Error(json.error || "Error desconocido");

        showToast("✓ Email enviado correctamente", "success");

        toInput.value = "";
        document.getElementById("subjectInput").value = "";
        document.getElementById("msgInput").value = "";
        selectedFiles = [];
        renderChips();

        // Actualizar lista local para autocomplete inmediato
        const e = to.toLowerCase();
        if (!allContacts.includes(e)) allContacts.unshift(e);

      } catch (err) {
        showToast("Error: " + err.message, "error");
      } finally {
        btn.disabled = false;
        document.getElementById("btnText").textContent = "Enviar";
        document.getElementById("spinner").style.display = "none";
        document.getElementById("sendIcon").style.display = "block";
      }
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = "") {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "show" + (type ? " " + type : "");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = ""; }, 3500);
    }
  </script>
</body>
</html>
