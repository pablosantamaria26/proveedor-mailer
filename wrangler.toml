name = "proveedor-mailer"
main = "worker.js"
compatibility_date = "2024-09-23"

# Cron trigger: revisar y enviar emails programados cada minuto
[triggers]
crons = ["* * * * *"]

# KV Namespace para contactos y emails programados
[[kv_namespaces]]
binding = "CONTACTS"
id = "64c2829e6c09450bb3a1f27b80f2ab51"
