<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Mailer · Mercado Limpio</title>

  <!-- PWA -->
  <link rel="manifest" href="/proveedor-mailer/manifest.json">
  <meta name="theme-color" content="#0f1b35">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mailer ML">
  <link rel="apple-touch-icon" href="/proveedor-mailer/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/proveedor-mailer/icon-192.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0f1b35;
      --navy2:   #1e3a6e;
      --gold:    #c9a558;
      --gold2:   #a8883c;
      --cream:   #f0ede8;
      --cream2:  #faf8f5;
      --border:  #e8e0d0;
      --text:    #2d3748;
      --muted:   #8a7a5a;
      --white:   #ffffff;
      --radius:  4px;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
    }

    /* ── Layout global ── */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--navy);
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 2px solid var(--gold);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-logo {
      height: 34px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: .92;
    }

    .topbar-divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,.15);
    }

    .topbar-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
    }

    .topbar-meta {
      font-size: 11px;
      color: rgba(255,255,255,.35);
      letter-spacing: .5px;
    }

    /* ── Contenido ── */
    .content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Panel izquierdo: formulario ── */
    .compose-panel {
      width: 420px;
      flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .compose-header {
      padding: 24px 28px 18px;
      border-bottom: 1px solid var(--border);
    }

    .compose-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: .3px;
    }

    .compose-header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* Campos */
    .field {
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      position: relative;
    }

    .field label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding-top: 17px;
      width: 56px;
      flex-shrink: 0;
    }

    .field input,
    .field textarea {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--navy);
      background: transparent;
      font-family: inherit;
      padding: 14px 0;
      line-height: 1.5;
    }

    .field textarea {
      resize: none;
      min-height: 200px;
      font-size: 14px;
    }

    .field input::placeholder,
    .field textarea::placeholder { color: #c0b89e; }

    .field input:focus, .field textarea:focus { background: #fdfcfa; }

    /* Autocomplete */
    .ac-list {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-top: none;
      box-shadow: 0 8px 28px rgba(15,27,53,.12);
      z-index: 100;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .ac-list.open { display: block; }

    .ac-item {
      padding: 11px 28px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ac-item:hover, .ac-item.active { background: var(--cream2); }
    .ac-item svg { color: var(--muted); flex-shrink: 0; }

    /* Adjuntos */
    .attach-zone {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
    }

    .attach-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .attach-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .5px;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }

    .attach-btn:hover {
      border-color: var(--gold);
      color: var(--gold2);
      background: #fdf9f0;
    }

    #fileInput { display: none; }

    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 8px;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 11px;
      color: var(--navy);
      max-width: 200px;
    }

    .chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip-size { color: var(--muted); flex-shrink: 0; }
    .chip-rm   { cursor: pointer; color: var(--muted); padding: 1px; border-radius: 2px; flex-shrink: 0; }
    .chip-rm:hover { color: #c0392b; background: #fde8e8; }

    /* Footer del compose */
    .compose-footer {
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--cream2);
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .from-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .from-dot {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn-send {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }

    .btn-send:hover:not(:disabled) { background: var(--navy2); }
    .btn-send:active:not(:disabled) { transform: scale(.97); }
    .btn-send:disabled { opacity: .5; cursor: not-allowed; }

    .btn-send .gold-bar {
      width: 14px; height: 2px;
      background: var(--gold);
      border-radius: 1px;
      transition: width .2s;
    }

    .btn-send:hover:not(:disabled) .gold-bar { width: 20px; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Panel derecho: preview ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--cream);
      overflow: hidden;
    }

    .preview-header {
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--cream2);
      flex-shrink: 0;
    }

    .preview-header svg { color: var(--muted); }

    .preview-header span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .preview-header .live-dot {
      width: 7px; height: 7px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
      margin-left: auto;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    .preview-header .live-label {
      font-size: 10px;
      color: #22c55e;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .preview-frame-wrap {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    .preview-shadow {
      max-width: 640px;
      margin: 0 auto;
      box-shadow: 0 8px 40px rgba(15,27,53,.15);
      border-radius: 2px;
      overflow: hidden;
    }

    #previewFrame {
      width: 100%;
      border: none;
      display: block;
      min-height: 500px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--navy);
      color: var(--white);
      padding: 13px 22px;
      border-left: 3px solid var(--gold);
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      opacity: 0;
      transition: opacity .25s, transform .25s;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: #22c55e; }
    #toast.error   { border-color: #e53e3e; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .content { flex-direction: column; overflow: visible; }

      .compose-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .preview-panel { display: none; }

      .topbar { padding: 0 16px; }
      .topbar-meta { display: none; }
      .field { padding: 0 16px; }
      .attach-zone, .compose-footer { padding: 14px 16px; }
      .compose-header { padding: 18px 16px 14px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-brand">
      <img class="topbar-logo"
           src="/proveedor-mailer/logo.jpeg"
           alt="Mercado Limpio">
      <div class="topbar-divider"></div>
      <span class="topbar-title">Comunicaciones</span>
    </div>
    <span class="topbar-meta">proveedores@mercadolimpio.ar</span>
  </header>

  <div class="content">

    <!-- Panel izquierdo: Formulario -->
    <aside class="compose-panel">

      <div class="compose-header">
        <h2>Nuevo mensaje</h2>
        <p>El proveedor recibirá una comunicación oficial de Mercado Limpio</p>
      </div>

      <!-- Para -->
      <div class="field" id="toField">
        <label for="toInput">Para</label>
        <input id="toInput" type="email" inputmode="email"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          placeholder="email@proveedor.com">
        <div class="ac-list" id="acList"></div>
      </div>

      <!-- Asunto -->
      <div class="field">
        <label for="subjectInput">Asunto</label>
        <input id="subjectInput" type="text" autocomplete="off"
          placeholder="Pedido · Lista de precios · Consulta">
      </div>

      <!-- Mensaje -->
      <div class="field" style="border-bottom:none">
        <label for="msgInput" style="padding-top:16px">Mensaje</label>
        <textarea id="msgInput"
          placeholder="Estimados,&#10;&#10;Me dirijo a ustedes..."
          spellcheck="true"></textarea>
      </div>

      <!-- Adjuntos -->
      <div class="attach-zone">
        <div class="attach-label">Adjuntos</div>
        <label class="attach-btn" for="fileInput">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586
                 a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
          </svg>
          Adjuntar archivo
        </label>
        <input type="file" id="fileInput" multiple
          accept=".pdf,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.webp,.csv,.txt,.zip,.doc,.docx">
        <div class="chips" id="chipsContainer"></div>
      </div>

      <!-- Footer con botón enviar -->
      <div class="compose-footer">
        <div class="from-badge">
          <div class="from-dot"></div>
          <span>proveedores@mercadolimpio.ar</span>
        </div>
        <button class="btn-send" id="sendBtn" onclick="sendEmail()">
          <span id="btnText">Enviar</span>
          <div class="spinner" id="spinner"></div>
          <div class="gold-bar"></div>
        </button>
      </div>

    </aside>

    <!-- Panel derecho: Preview -->
    <main class="preview-panel">
      <div class="preview-header">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
               9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
        <span>Vista previa del email</span>
        <div class="live-dot"></div>
        <span class="live-label">En vivo</span>
      </div>
      <div class="preview-frame-wrap">
        <div class="preview-shadow">
          <iframe id="previewFrame" sandbox="allow-same-origin"></iframe>
        </div>
      </div>
    </main>

  </div>
</div>

<div id="toast"></div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const WORKER_URL    = "https://proveedor-mailer.santamariapablodaniel.workers.dev";
  const MAILER_SECRET = "Galamar3";
  const HEADERS       = { "X-Mailer-Secret": MAILER_SECRET };
  const LOGO_URL      = "/proveedor-mailer/logo.jpeg";
  const FROM_EMAIL    = "proveedores@mercadolimpio.ar";
  const FROM_NAME     = "Mercado Limpio";

  // ── Archivos ─────────────────────────────────────────────────────────────────
  let selectedFiles = [];

  document.getElementById("fileInput").addEventListener("change", function () {
    Array.from(this.files).forEach(f => {
      if (!selectedFiles.find(x => x.name === f.name && x.size === f.size))
        selectedFiles.push(f);
    });
    this.value = "";
    renderChips();
    refreshPreview();
  });

  function renderChips() {
    const c = document.getElementById("chipsContainer");
    c.innerHTML = "";
    selectedFiles.forEach((f, i) => {
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.innerHTML = `
        ${fileIcon(f.name)}
        <span class="chip-name" title="${esc(f.name)}">${esc(f.name)}</span>
        <span class="chip-size">${fmtSize(f.size)}</span>
        <span class="chip-rm" onclick="removeFile(${i})">
          <svg width="11" height="11" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </span>`;
      c.appendChild(chip);
    });
  }

  function removeFile(i) { selectedFiles.splice(i, 1); renderChips(); refreshPreview(); }

  // ── Autocomplete ─────────────────────────────────────────────────────────────
  let allContacts = [], acActive = -1;

  fetch(`${WORKER_URL}/contacts`, { headers: HEADERS })
    .then(r => r.json()).then(d => { allContacts = Array.isArray(d) ? d : []; })
    .catch(() => {});

  const toInput = document.getElementById("toInput");
  const acList  = document.getElementById("acList");

  toInput.addEventListener("input",   () => { showAc(); refreshPreview(); });
  toInput.addEventListener("focus",   showAc);
  toInput.addEventListener("keydown", navigateAc);
  document.getElementById("subjectInput").addEventListener("input", refreshPreview);
  document.getElementById("msgInput").addEventListener("input", refreshPreview);
  document.addEventListener("click", e => { if (!e.target.closest("#toField")) closeAc(); });

  function showAc() {
    const q = toInput.value.trim().toLowerCase();
    const m = q.length === 0
      ? allContacts.slice(0, 7)
      : allContacts.filter(c => c.includes(q)).slice(0, 7);
    if (!m.length) { closeAc(); return; }
    acList.innerHTML = m.map((c, i) => `
      <div class="ac-item" data-email="${esc(c)}" data-idx="${i}" onclick="selectAc('${esc(c)}')">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        ${esc(c)}
      </div>`).join("");
    acActive = -1;
    acList.classList.add("open");
  }

  function navigateAc(e) {
    const items = acList.querySelectorAll(".ac-item");
    if (!items.length) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      acActive = Math.min(acActive + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle("active", i === acActive));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      acActive = Math.max(acActive - 1, -1);
      items.forEach((el, i) => el.classList.toggle("active", i === acActive));
    } else if (e.key === "Enter" && acActive >= 0) {
      e.preventDefault();
      selectAc(items[acActive].dataset.email);
    } else if (e.key === "Escape") {
      closeAc();
    }
  }

  function selectAc(email) {
    toInput.value = email;
    closeAc();
    document.getElementById("subjectInput").focus();
    refreshPreview();
  }

  function closeAc() { acList.classList.remove("open"); acActive = -1; }

  // ── Preview en vivo ──────────────────────────────────────────────────────────
  let previewTimer;

  function refreshPreview() {
    clearTimeout(previewTimer);
    previewTimer = setTimeout(_buildPreview, 250);
  }

  function _buildPreview() {
    const subject = document.getElementById("subjectInput").value || "Asunto del mensaje";
    const message = document.getElementById("msgInput").value    || "El contenido del mensaje aparecerá aquí...";
    const date    = new Date().toLocaleDateString("es-AR", { day:"2-digit", month:"long", year:"numeric" });

    const attachList = selectedFiles.length ? `
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:28px">
        <tr><td style="padding-bottom:10px;font-family:'Helvetica Neue',Arial,sans-serif;
                       font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
                       color:#8a7a5a;border-bottom:1px solid #e8e0d0">Archivos adjuntos</td></tr>
        ${selectedFiles.map(f => `
        <tr><td style="padding:10px 0;font-family:'Helvetica Neue',Arial,sans-serif;
                       font-size:13px;color:#4a5568;border-bottom:1px solid #f0ede8">
          📎&nbsp;&nbsp;${esc(f.name)}
        </td></tr>`).join("")}
      </table>` : "";

    const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>*{box-sizing:border-box}body{margin:0;background:#f0ede8;font-family:'Helvetica Neue',Arial,sans-serif}</style>
</head><body>
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f0ede8;padding:32px 16px">
<tr><td align="center">
<table width="100%" cellpadding="0" cellspacing="0" border="0"
       style="max-width:580px;background:#fff;box-shadow:0 4px 32px rgba(15,27,53,.10)">
  <tr><td height="6" style="background:linear-gradient(90deg,#0f1b35 0%,#1e3a6e 100%)">&nbsp;</td></tr>
  <tr><td align="center" style="padding:36px 48px 30px;border-bottom:3px solid #c9a558">
    <img src="${location.origin}/proveedor-mailer/logo.jpeg" width="190" style="display:block;border:0">
  </td></tr>
  <tr><td style="padding:28px 48px 0">
    <p style="margin:0 0 5px;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#8a7a5a;font-weight:600">${date}</p>
    <h2 style="margin:0;font-size:18px;font-weight:300;color:#0f1b35;letter-spacing:.3px;line-height:1.35;border-bottom:1px solid #ede8e0;padding-bottom:20px">${escHtml(subject)}</h2>
  </td></tr>
  <tr><td style="padding:28px 48px 36px">
    <p style="margin:0;font-size:15px;color:#2d3748;line-height:1.85;font-weight:300">${escHtml(message).replace(/\n/g,"<br>")}</p>
    ${attachList}
  </td></tr>
  <tr><td height="1" style="background:#c9a558">&nbsp;</td></tr>
  <tr><td style="padding:28px 48px;background:#faf8f5">
    <p style="margin:0 0 3px;font-size:13px;font-weight:700;color:#0f1b35">${FROM_NAME}</p>
    <p style="margin:0 0 10px;font-size:12px;color:#8a7a5a">Distribuidora · Buenos Aires, Argentina</p>
    <p style="margin:0;font-size:11px;color:#a09070">${FROM_EMAIL}</p>
  </td></tr>
  <tr><td style="padding:18px 48px;background:#0f1b35">
    <p style="margin:0;font-size:10px;color:#5a7ab5;letter-spacing:1px;text-transform:uppercase">
      Mercado Limpio Distribuidora ®
    </p>
    <p style="margin:4px 0 0;font-size:10px;color:#3d5a8a">
      Este email y sus adjuntos son confidenciales y de uso exclusivo del destinatario.
    </p>
  </td></tr>
</table>
</td></tr></table>
</body></html>`;

    const frame = document.getElementById("previewFrame");
    frame.srcdoc = html;

    // Ajustar altura al contenido
    frame.onload = () => {
      try {
        const h = frame.contentDocument.body.scrollHeight;
        frame.style.height = Math.max(h + 32, 500) + "px";
      } catch {}
    };
  }

  // Inicializar preview vacío
  _buildPreview();

  // ── Envío ────────────────────────────────────────────────────────────────────
  async function sendEmail() {
    const to      = toInput.value.trim();
    const subject = document.getElementById("subjectInput").value.trim();
    const message = document.getElementById("msgInput").value.trim();

    if (!to)      { showToast("Ingresá el email del proveedor", "error"); toInput.focus(); return; }
    if (!subject) { showToast("Escribí el asunto", "error"); document.getElementById("subjectInput").focus(); return; }
    if (!message) { showToast("El mensaje no puede estar vacío", "error"); document.getElementById("msgInput").focus(); return; }

    const btn = document.getElementById("sendBtn");
    btn.disabled = true;
    document.getElementById("btnText").textContent = "Enviando";
    document.getElementById("spinner").style.display = "block";

    try {
      const form = new FormData();
      form.append("to", to);
      form.append("subject", subject);
      form.append("message", message);
      selectedFiles.forEach(f => form.append("archivos", f));

      const res  = await fetch(`${WORKER_URL}/send`, { method: "POST", headers: HEADERS, body: form });
      const json = await res.json();

      if (!json.ok) throw new Error(json.error || "Error desconocido");

      showToast("Email enviado correctamente", "success");

      toInput.value = "";
      document.getElementById("subjectInput").value = "";
      document.getElementById("msgInput").value = "";
      selectedFiles = [];
      renderChips();
      _buildPreview();

      const e = to.toLowerCase();
      if (!allContacts.includes(e)) allContacts.unshift(e);

    } catch (err) {
      showToast("Error: " + err.message, "error");
    } finally {
      btn.disabled = false;
      document.getElementById("btnText").textContent = "Enviar";
      document.getElementById("spinner").style.display = "none";
    }
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = "") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "show" + (type ? " " + type : "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ""; }, 3500);
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function fmtSize(b) {
    if (b < 1024) return b + " B";
    if (b < 1048576) return (b/1024).toFixed(0) + " KB";
    return (b/1048576).toFixed(1) + " MB";
  }

  function fileIcon(name) {
    const ext = name.split(".").pop().toLowerCase();
    if (["jpg","jpeg","png","gif","webp"].includes(ext))
      return `<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;
    if (["xls","xlsx","csv"].includes(ext))
      return `<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 17v-2m3 2v-4m3 4v-6M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>`;
    return `<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>`;
  }
</script>
